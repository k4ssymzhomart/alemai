# IGERIM backend — Alembic configuration.
# The database URL is NOT set here: migrations/env.py reads it from
# app.config.get_settings() (env DATABASE_URL override respected).

[alembic]
# %(here)s = directory of this file → works from any cwd (app.seed relies on it)
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
