name: igerim

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: igerim
      POSTGRES_PASSWORD: igerim
      POSTGRES_DB: igerim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igerim -d igerim"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://igerim:igerim@db:5432/igerim
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  pgdata:
