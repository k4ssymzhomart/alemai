name: igerim

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: igerim
      POSTGRES_PASSWORD: igerim
      POSTGRES_DB: igerim
    ports:
      # host 55432 (5432 is occupied by another local project); in-network stays db:5432
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U igerim -d igerim"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      # host 8800 (8000 is occupied by another local project); in-container stays :8000
      - "8800:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://igerim:igerim@db:5432/igerim
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # RapidAPI GPT-4o-mini key — from the gitignored root .env (never tracked).
      # Only used when LLM_TITLES=live (H4 doc auto-titles); default deterministic.
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
      LLM_TITLES: ${LLM_TITLES:-off}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      # read-only mounts: app.seed runs datagen from /datagen (make seed);
      # /shared exposes glossary.csv and reference data to the backend
      - ./datagen:/datagen:ro
      - ./shared:/shared:ro
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8800/api/v1
    depends_on:
      - api

volumes:
  pgdata:
