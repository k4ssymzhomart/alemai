# ----------------------------------------------------------------------------
# Planted storylines (docs/06 §4) — demo fixtures AND golden-test fixtures.
# All disabled for now: planter functions in generate.py raise
# NotImplementedError until implemented. Numbers below are the acceptance
# targets from docs/06 §4 and §10.
# ----------------------------------------------------------------------------
storylines:
  - key: mri_over_execution              # storyline 1
    enabled: false
    description_ru: "КДУ/МРТ идёт на 118% месячного плана с марта 2026 → burn-out ≈ 14.10.2026"
    params:
      care_type: kdu
      service_code: S010
      monthly_run_rate: 1.18
      start_month: "2026-03"
      expected_burn_out_date: "2026-10-14"
      expected_recoverable_amount: 12400000   # ₸ at корректировка

  - key: dent_under_execution            # storyline 2
    enabled: false
    description_ru: "Стоматология на 71% run-rate (отток кадров) → недоосвоение ≈ 9.8 млн ₸"
    params:
      care_type: dent
      run_rate: 0.71
      expected_year_end_gap: 9800000          # ₸

  - key: creative_doctor                 # storyline 3
    enabled: false
    description_ru: "Один терапевт: шаблонные пакеты, 30% услуг в выходные, до 80+ визитов/день в конце месяца"
    params:
      specialty: "терапевт"
      template_package_min_patients: 5
      weekend_service_share: 0.30
      month_end_day_visits: 80

  - key: posthumous_services             # storyline 4
    enabled: false
    description_ru: "2 пациента с датой смерти, 3 услуги после неё → R01 ловит 100%"
    params:
      patients_with_death_date: 2
      claims_after_death: 3

  - key: sex_age_mismatch_batch          # storyline 5
    enabled: false
    description_ru: "31 маммография мужчинам + 12 скринингов вне возраста в ноябрьском реестре"
    params:
      registry_period: "2025-11"
      male_mammography_claims: 31
      underage_screening_claims: 12
      expected_verdict_positions: 143
      expected_amount_at_risk: 8400000        # ₸

  - key: under_billing                   # storyline 6
    enabled: false
    description_ru: "260 завершённых случаев МИС (≈4.2 млн ₸) не попали в счёт-реестр → сверка, bucket 1"
    params:
      mis_only_cases: 260
      expected_amount: 4200000                # ₸

  - key: reform_mis_billing              # storyline 7
    enabled: false
    description_ru: "180 диабет-случаев в янв–фев 2026 выставлены на ГОБМП вместо ОСМС → R17"
    params:
      claims: 180
      months: ["2026-01", "2026-02"]
      icd10_prefixes: ["E10", "E11"]
      billed_source: gobmp
      correct_source: osms
