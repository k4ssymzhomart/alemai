# ============================================================================
# IGERIM synthetic data generator — BASE configuration (shared across profiles)
# Source of truth: docs/06-DATA-ANALYTICS.md §4 + docs/17-NEXT-DIRECTIVE.md EPIC B
# Conventions (docs/05 §4): money = integer ₸ (no decimals), months = "YYYY-MM",
# ids = uuid (deterministic from seed), all times UTC.
#
# Scale-specific settings (organization size, contract ₸, department mix,
# execution_profile) live in datagen/profiles/<profile>.yaml and are merged over
# this base by --profile (DEFAULT: gp14-real). Every planted storyline number
# lives in datagen/storylines.yaml (the single source of truth), not here.
# ============================================================================

seed: 42
default_profile: gp14-real

period:
  start: "2024-07"               # inclusive
  end: "2026-06"                 # inclusive → 24 months of claims

reform:
  # Единый пакет 2026: funding-source mapping switches on this date.
  # The generator applies the post-2026 split to the 2026 contract year.
  unified_package_switch_date: "2026-01-01"

claims:
  # plan_qty is DERIVED from plan_amount ÷ representative tariff (see generate.py),
  # so a line executes at ≈ its execution_profile. No separate row target needed.
  sample_population: 2000              # default patient sample in --sample mode
  sample_volume_scale: 0.03            # claim-volume multiplier in --sample mode (~fast run)
  paid_lag_months: 1                   # accepted claims older than this become "paid"
  referral_coverage_kdu: 0.96          # rest stay referral-less (future R07 material)
  weekend_visit_weight: 0.06           # relative probability of a base claim on Sat/Sun
  status_distribution:                 # docs/06 §4: 97% accepted / 1.5% rejected / 1.5% pending
    accepted: 0.97
    rejected: 0.015
    submitted: 0.015                   # "pending" — submitted, adjudication not finished
  # NB: mis_only is NOT in the base distribution — it is planted only by
  # storyline 6 (under_billing), so mis_only count is exactly the planted count.

seasonality:                           # multiplicative index [Jan..Dec]; docs/06 §4
  pmsp:      [1.25, 1.25, 1.05, 1.00, 1.00, 0.95, 0.90, 0.80, 1.00, 1.05, 1.10, 1.25]   # winter ОРВИ peak, August dip
  kdu:       [0.95, 0.95, 1.00, 1.00, 1.00, 0.95, 0.90, 0.85, 1.00, 1.05, 1.30, 1.30]   # Nov–Dec "год закрывают" rush
  day_hosp:  [1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00]   # flat
  dent:      [1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00]   # flat
  screening: [0.60, 0.70, 1.60, 1.20, 0.90, 0.70, 0.50, 0.50, 1.60, 1.20, 0.90, 0.70]   # campaign waves Mar & Sep
  other:     [1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00]   # flat

population:                            # KZ census pyramid approximation
  female_share: 0.515
  attached_share: 0.98
  insured_share: 0.85
  age_bands:                           # weights sum to 1.0
    - {age_min: 0,  age_max: 4,  weight: 0.105}
    - {age_min: 5,  age_max: 9,  weight: 0.100}
    - {age_min: 10, age_max: 14, weight: 0.090}
    - {age_min: 15, age_max: 19, weight: 0.070}
    - {age_min: 20, age_max: 24, weight: 0.060}
    - {age_min: 25, age_max: 29, weight: 0.065}
    - {age_min: 30, age_max: 34, weight: 0.080}
    - {age_min: 35, age_max: 39, weight: 0.080}
    - {age_min: 40, age_max: 44, weight: 0.070}
    - {age_min: 45, age_max: 49, weight: 0.060}
    - {age_min: 50, age_max: 54, weight: 0.050}
    - {age_min: 55, age_max: 59, weight: 0.045}
    - {age_min: 60, age_max: 64, weight: 0.040}
    - {age_min: 65, age_max: 69, weight: 0.030}
    - {age_min: 70, age_max: 74, weight: 0.020}
    - {age_min: 75, age_max: 79, weight: 0.015}
    - {age_min: 80, age_max: 94, weight: 0.020}

