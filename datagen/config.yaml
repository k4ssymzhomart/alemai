# ============================================================================
# IGERIM synthetic data generator — configuration
# Source of truth: docs/06-DATA-ANALYTICS.md §4
# Conventions (docs/05 §4): money = integer ₸ (no decimals), months = "YYYY-MM",
# ids = uuid (deterministic from seed), all times UTC.
# ============================================================================

seed: 42

organization:
  name_kk: "№14 қалалық емхана (демо)"
  name_ru: "Городская поликлиника №14 (демо)"
  type: polyclinic
  attached_population: 130000
  sample_population: 5000        # patients generated in --sample mode

period:
  start: "2024-07"               # inclusive
  end: "2026-06"                 # inclusive → 24 months of claims

reform:
  # Единый пакет 2026: funding-source mapping switches on this date.
  # The generator applies the post-2026 split to the 2026 contract year.
  unified_package_switch_date: "2026-01-01"

contract:
  annual_target_amount: 5200000000     # ₸ per contract year (≈ 5.2 bn)
  care_type_split:                     # shares of annual_target_amount; sum = 1.0
    pmsp: 0.55                         # ПМСП (подушевой)
    kdu: 0.20                          # КДУ
    day_hosp: 0.10                     # дневной стационар
    dent: 0.05                         # стоматология
    screening: 0.06                    # скрининги
    other: 0.04                        # прочее — emitted as care_type "ambulance" (неотложная помощь)
  funding_source_split:                # share of each line by source; per era
    pre_2026:
      pmsp:      {gobmp: 0.40, osms: 0.60}
      kdu:       {gobmp: 0.30, osms: 0.70}
      day_hosp:  {gobmp: 0.25, osms: 0.75}
      dent:      {gobmp: 0.35, osms: 0.65}
      screening: {gobmp: 1.00, osms: 0.00}
      other:     {gobmp: 0.70, osms: 0.30}
    post_2026:                         # Единый пакет: weight shifts toward ОСМС
      pmsp:      {gobmp: 0.30, osms: 0.70}
      kdu:       {gobmp: 0.15, osms: 0.85}
      day_hosp:  {gobmp: 0.15, osms: 0.85}
      dent:      {gobmp: 0.30, osms: 0.70}
      screening: {gobmp: 1.00, osms: 0.00}
      other:     {gobmp: 0.60, osms: 0.40}

claims:
  target_rows: 500000                  # over the whole 24-month period (NFR, docs/04 §4)
  sample_target_rows: 1000             # used in --sample mode (claims volume only)
  care_type_row_share:                 # share of claim ROWS (not ₸); sum = 1.0
    pmsp: 0.58
    kdu: 0.24
    screening: 0.08
    dent: 0.05
    day_hosp: 0.02
    other: 0.03
  execution_profile:                   # fact volume ≈ Poisson(plan_qty × profile)
    pmsp: 1.00
    kdu: 1.03
    day_hosp: 0.97
    dent: 0.90
    screening: 0.95
    other: 1.00
  status_distribution:                 # docs/06 §4: 97% accepted / 1.5% rejected / 1.5% pending
    accepted: 0.97
    rejected: 0.015
    submitted: 0.015                   # "pending" — submitted, adjudication not finished
  paid_lag_months: 1                   # accepted claims older than this become "paid"
  referral_coverage_kdu: 0.96          # rest stay referral-less (future R07 material)
  weekend_visit_weight: 0.06           # relative probability of a claim on Sat/Sun

seasonality:                           # multiplicative index [Jan..Dec]; docs/06 §4
  pmsp:      [1.25, 1.25, 1.05, 1.00, 1.00, 0.95, 0.90, 0.80, 1.00, 1.05, 1.10, 1.25]   # winter ОРВИ peak, August dip
  kdu:       [0.95, 0.95, 1.00, 1.00, 1.00, 0.95, 0.90, 0.85, 1.00, 1.05, 1.30, 1.30]   # Nov–Dec "год закрывают" rush
  day_hosp:  [1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00]   # flat
  dent:      [1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00]   # flat
  screening: [0.60, 0.70, 1.60, 1.20, 0.90, 0.70, 0.50, 0.50, 1.60, 1.20, 0.90, 0.70]   # campaign waves Mar & Sep
  other:     [1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00, 1.00]   # flat

population:                            # KZ census pyramid approximation
  female_share: 0.515
  attached_share: 0.98
  insured_share: 0.85
  age_bands:                           # weights sum to 1.0
    - {age_min: 0,  age_max: 4,  weight: 0.105}
    - {age_min: 5,  age_max: 9,  weight: 0.100}
    - {age_min: 10, age_max: 14, weight: 0.090}
    - {age_min: 15, age_max: 19, weight: 0.070}
    - {age_min: 20, age_max: 24, weight: 0.060}
    - {age_min: 25, age_max: 29, weight: 0.065}
    - {age_min: 30, age_max: 34, weight: 0.080}
    - {age_min: 35, age_max: 39, weight: 0.080}
    - {age_min: 40, age_max: 44, weight: 0.070}
    - {age_min: 45, age_max: 49, weight: 0.060}
    - {age_min: 50, age_max: 54, weight: 0.050}
    - {age_min: 55, age_max: 59, weight: 0.045}
    - {age_min: 60, age_max: 64, weight: 0.040}
    - {age_min: 65, age_max: 69, weight: 0.030}
    - {age_min: 70, age_max: 74, weight: 0.020}
    - {age_min: 75, age_max: 79, weight: 0.015}
    - {age_min: 80, age_max: 94, weight: 0.020}

departments:                           # 14 depts, counts sum to 120 doctors
  - {name: "Терапия",                    specialty: "терапевт",                        count: 18, care_types: [pmsp, ambulance]}
  - {name: "ВОП",                        specialty: "врач общей практики",             count: 22, care_types: [pmsp, ambulance, screening]}
  - {name: "Педиатрия",                  specialty: "педиатр",                         count: 16, care_types: [pmsp]}
  - {name: "Кардиология",                specialty: "кардиолог",                       count: 6,  care_types: [kdu]}
  - {name: "Неврология",                 specialty: "невролог",                        count: 6,  care_types: [kdu]}
  - {name: "Эндокринология",             specialty: "эндокринолог",                    count: 5,  care_types: [kdu]}
  - {name: "Хирургия",                   specialty: "хирург",                          count: 6,  care_types: [kdu]}
  - {name: "Офтальмология",              specialty: "офтальмолог",                     count: 5,  care_types: [kdu]}
  - {name: "Оториноларингология",        specialty: "оториноларинголог",               count: 5,  care_types: [kdu]}
  - {name: "Акушерство-гинекология",     specialty: "акушер-гинеколог",                count: 7,  care_types: [kdu, screening]}
  - {name: "Стоматология",               specialty: "стоматолог",                      count: 8,  care_types: [dent]}
  - {name: "Лучевая диагностика",        specialty: "рентгенолог",                     count: 6,  care_types: [kdu, screening]}
  - {name: "Функциональная диагностика", specialty: "врач функциональной диагностики", count: 5,  care_types: [kdu, screening]}
  - {name: "Дневной стационар",          specialty: "терапевт дневного стационара",    count: 5,  care_types: [day_hosp]}

