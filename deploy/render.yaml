# Render Blueprint (docs/25 H5) — QALAM backend + managed Postgres.
#
# Deploy: Render → New → Blueprint → point at this repo → Apply. Render reads
# this file, provisions the Postgres DB + the API web service, and wires
# DATABASE_URL automatically. After the API is up, set CORS_ORIGINS to your
# Vercel URL (see deploy/README-DEPLOY.md).
#
# Both resources are on the FREE tier — zero-cost, and it provisions on a
# blocked/free (Hobby) workspace. Trade-offs (fine for the pitch window): the
# web service spins down after 15 min idle (~30–60 s cold start on first hit)
# and the free Postgres expires 30 days after creation. The venue demo runs
# LOCAL `docker compose` regardless — this public URL is for jury follow-up,
# not the stage. Production upgrade path is noted inline at the bottom.
services:
  - type: web
    name: qalam-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /healthz
    plan: free # free web instance — no bill on a blocked/free workspace
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qalam-db
          property: connectionString # bare postgres:// — the app coerces the driver
      - key: CORS_ORIGINS
        sync: false # set to your frontend origin, e.g. https://qalam.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: SERVICE_TOKEN
        generateValue: true
      - key: SEED_ON_BOOT
        value: "1" # bootstrap migrations + login/reference data on first boot

databases:
  - name: qalam-db
    plan: free # free Postgres — the only DB plan valid for a NEW db on a free workspace
    ipAllowList: [] # internal-only: the API reaches the DB over Render's private network
    # NB: do NOT set diskSizeGB on free (fixed 1 GB) — that field is only valid on basic-*/pro-*.
    # UPGRADE PATH (once the card is fixed / for production): set this DB `plan: basic-256mb`
    #   (optional: diskSizeGB: 15) and the web service `plan: starter` — no 30-day expiry,
    #   no cold starts. Leave as a commented alternative.
