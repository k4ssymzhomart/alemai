name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  data-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: rules catalog
        run: python backend/scripts/validate_rules.py
      - name: glossary
        run: python backend/scripts/validate_glossary.py
      - name: rule golden-test cases
        run: python backend/scripts/validate_rule_cases.py
      - name: copilot eval set
        run: python backend/scripts/validate_eval_set.py
      - name: ui strings
        run: python backend/scripts/validate_ui_strings.py

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: igerim
          POSTGRES_PASSWORD: igerim
          POSTGRES_DB: igerim
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql+psycopg://igerim:igerim@localhost:5432/igerim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: pip install -r requirements.txt
      - run: python -m compileall app
      - name: rules catalog validation
        run: |
          if [ -f scripts/validate_rules.py ]; then python scripts/validate_rules.py; fi
      - name: seed sample dataset (migrations + datagen + COPY + MV refresh)
        run: python -m app.seed --sample
      - name: seed integrity — DB vs manifest vs API
        run: python scripts/assert_seed_integrity.py /tmp/igerim_seed/manifest.json
      - name: pytest (smoke + unit + integration)
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
