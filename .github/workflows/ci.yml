name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ownership-fence:
    # frontend/** and core code are LEAD-only; junior PRs may touch only data/content paths.
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'k4ssymzhomart'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: enforce junior path allowlist
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")
          echo "Changed files:"; echo "$CHANGED"
          VIOLATIONS=$(echo "$CHANGED" | grep -vE '^(shared/|backend/rules/|backend/regs/|backend/tests/fixtures/|backend/eval/|backend/templates/drafts/|docs/)' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::These paths are outside the junior-track allowlist (frontend/** and core code are @k4ssymzhomart-only):"
            echo "$VIOLATIONS"
            echo "Allowed: shared/, backend/rules/, backend/regs/, backend/tests/fixtures/, backend/eval/, backend/templates/drafts/, docs/"
            exit 1
          fi
          echo "OK: all changes within the junior allowlist"

  data-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: rules catalog
        run: python backend/scripts/validate_rules.py
      - name: glossary
        run: python backend/scripts/validate_glossary.py
      - name: rule golden-test cases
        run: python backend/scripts/validate_rule_cases.py
      - name: copilot eval set
        run: python backend/scripts/validate_eval_set.py
      - name: ui strings
        run: python backend/scripts/validate_ui_strings.py

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: pip install -r requirements.txt
      - run: python -m compileall app
      - name: rules catalog validation
        run: |
          if [ -f scripts/validate_rules.py ]; then python scripts/validate_rules.py; fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
